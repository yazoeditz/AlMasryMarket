<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify OTP - El Mahdi Market</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      background: url('wallpaper.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 800px;
      background: linear-gradient(135deg, #f8f8f8 0%, #e8e8e8 100%);
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
      padding: 40px;
      box-sizing: border-box;
      text-align: center;
    }

    .logo-container {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      border: 5px solid #fff;
      overflow: hidden;
    }

    .logo-img {
      width: 90%;
      height: auto;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      color: #333;
      margin-bottom: 5px;
    }

    .brand-subtitle {
      font-size: 18px;
      letter-spacing: 5px;
      color: #777;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    label {
      font-weight: 700;
      color: #555;
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
    }

    input[type="text"] {
      width: 80%;
      padding: 14px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 20px;
    }

    .otp-btn, .back-btn {
      width: 80%;
      padding: 16px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .otp-btn {
      background-color: #ef1414;
      color: white;
      margin-bottom: 10px;
    }

    .otp-btn:hover {
      background-color: #222;
    }

    .back-btn {
      background-color: #777;
      color: white;
    }

    .back-btn:hover {
      background-color: #444;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="mahdi.png.jpg" alt="El Mahdi Logo" class="logo-img" />
    </div>
    <div class="brand-name">EL MAHDI</div>
    <div class="brand-subtitle">MARKET</div>

    <label for="otp">Enter OTP</label>
    <input type="text" id="otp" placeholder="Enter the OTP sent to your email"/>

    <button class="otp-btn">Verify OTP</button>
    <button class="back-btn">Back to Login</button>
  </div>

  <script>
    document.querySelector('.otp-btn')?.addEventListener('click', function () {
      const otp = document.getElementById('otp')?.value || '';
      parent.Shiny.setInputValue('otp_verify-reset_otp_input', otp, {priority: 'event'});
      parent.Shiny.setInputValue('otp_verify-verify_reset_otp_button', true, {priority: 'event'});
    });

    document.querySelector('.back-btn')?.addEventListener('click', function () {
      parent.Shiny.setInputValue('otp_verify-to_login', true, {priority: 'event'});
    });
  </script>
</body>
</html>
