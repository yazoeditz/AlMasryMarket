<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password - EL MAHDI MARKET</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

    body {
      font-family: 'Montserrat', sans-serif;
      background: url('wallpaper.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      width: 800px;
      background: linear-gradient(135deg, #f8f8f8 0%, #e8e8e8 100%);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .logo-container {
      width: 180px;
      height: 180px;
      margin: 0 auto 30px;
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid white;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .logo-img {
      width: 100%;
      height: auto;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #333;
    }

    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 2px solid #ccc;
      margin-bottom: 20px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 16px;
      background-color: #ef1414;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 15px;
    }

    button:hover {
      background-color: #222;
    }

    .back {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="mahdi.png.jpg" class="logo-img" alt="Logo">
    </div>
    <h2>Reset Password</h2>
    <p>Enter your email address to receive a reset code.</p>
    <input type="email" id="forgot_email" placeholder="Your Email" />
    <button onclick="sendOTP()">Send Reset OTP</button>
    <button class="back" onclick="parent.Shiny.setInputValue('forgot_password-to_login', true)">Back to Login</button>
  </div>

  <script>
    function sendOTP() {
      parent.Shiny.setInputValue('forgot_password-forgot_email', document.getElementById('forgot_email').value);
      parent.Shiny.setInputValue('forgot_password-send_reset_otp', true, {priority: 'event'});
    }
  </script>
</body>
</html>
