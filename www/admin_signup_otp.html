<!-- admin_signup_otp.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Sign-Up OTP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      background: url('wallpaper.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 700px;
      background: linear-gradient(135deg, #f8f8f8, #e8e8e8);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    .logo-container {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin: 0 auto 20px;
      overflow: hidden;
      border: 4px solid white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .logo-container img {
      width: 100%;
      height: auto;
    }

    h2 {
      font-size: 28px;
      color: #333;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 20px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
      text-transform: uppercase;
    }

    .verify-btn {
      background-color: #ef1414;
      color: white;
    }

    .verify-btn:hover {
      background-color: #222;
    }

    .back-btn {
      background-color: #777;
      color: white;
    }

    .back-btn:hover {
      background-color: #222;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="mahdi.png.jpg" alt="Logo" />
    </div>
    <h2>Verify Admin Sign-Up OTP</h2>
    <input type="text" id="otp" placeholder="Enter OTP" />
    <button class="btn verify-btn">Verify OTP</button>
    <button class="btn back-btn">Back to Login</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelector('.verify-btn')?.addEventListener('click', function () {
        const otp = document.getElementById('otp')?.value || '';
        window.parent.postMessage({ type: 'verify_admin_signup_otp', otp: otp }, '*');
      });

      document.querySelector('.back-btn')?.addEventListener('click', function () {
        window.parent.postMessage({ type: 'go_back' }, '*');
      });
    });
  </script>
</body>
</html>
