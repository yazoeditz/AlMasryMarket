<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      background: url('wallpaper.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 700px;
      padding: 30px 50px;
      background: linear-gradient(135deg, #f8f8f8, #e8e8e8);
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      text-align: center;
    }

    .logo-container {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin: 20px auto 20px;
      border: 4px solid white;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .logo-img {
      width: 100%;
      height: auto;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      color: #333;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      font-weight: bold;
      font-size: 14px;
      color: #555;
      display: block;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    input:focus {
      border-color: #888;
      outline: none;
    }

    .reset-btn, .back-btn {
      width: 100%;
      padding: 16px;
      font-weight: 700;
      font-size: 15px;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .reset-btn {
      background-color: #ef1414;
      color: white;
    }

    .reset-btn:hover {
      background-color: #222;
    }

    .back-btn {
      background-color: #777;
      color: white;
    }

    .back-btn:hover {
      background-color: #222;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="mahdi.png.jpg" alt="Logo" class="logo-img" />
    </div>
    <h2>Reset Your Password</h2>

    <div class="form-group">
      <label for="new_password">New Password</label>
      <input type="password" id="new_password" placeholder="Create new password" />
    </div>

    <div class="form-group">
      <label for="confirm_new_password">Confirm Password</label>
      <input type="password" id="confirm_new_password" placeholder="Confirm password" />
    </div>

    <button class="reset-btn">Reset Password</button>
    <button class="back-btn">Back to Login</button>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelector('.reset-btn')?.addEventListener('click', function () {
        const pass1 = document.getElementById('new_password')?.value || '';
        const pass2 = document.getElementById('confirm_new_password')?.value || '';
        window.parent.postMessage({ type: 'reset_password', pass1: pass1, pass2: pass2 }, '*');
      });

      document.querySelector('.back-btn')?.addEventListener('click', function () {
        window.parent.postMessage({ type: 'go_back' }, '*');
      });
    });
  </script>
</body>
</html>
