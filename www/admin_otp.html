<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Admin OTP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      background: url('wallpaper.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 600px;
      padding: 30px 40px;
      background: linear-gradient(135deg, #f8f8f8, #e8e8e8);
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .logo-container {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin: 20px auto;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      border: 4px solid white;
    }

    .logo-img {
      width: 100%;
      height: auto;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 25px;
      color: #333;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 5px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 8px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 12px;
      transition: 0.3s;
    }

    .verify-btn {
      background-color: #ef1414;
      color: white;
    }

    .verify-btn:hover {
      background-color: #222;
    }

    .back-btn {
      background-color: #777;
      color: white;
    }

    .back-btn:hover {
      background-color: #222;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="mahdi.png.jpg" alt="Logo" class="logo-img" />
    </div>
    <h2>Verify Admin OTP</h2>

    <div class="form-group">
      <label for="otp">Enter OTP</label>
      <input type="text" id="otp" placeholder="6-digit code" />
    </div>

    <button class="btn verify-btn">Verify OTP</button>
    <button class="btn back-btn">Back to Login</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelector('.verify-btn')?.addEventListener('click', function () {
        const otp = document.getElementById('otp')?.value || '';
        window.parent.postMessage({ type: 'verify_admin_otp', otp: otp }, '*');
      });

      document.querySelector('.back-btn')?.addEventListener('click', function () {
        window.parent.postMessage({ type: 'go_back' }, '*');
      });
    });
  </script>
</body>
</html>
